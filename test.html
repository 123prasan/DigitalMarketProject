<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Secure Viewer</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #323639; overflow: hidden;
        }

        .viewer-wrapper {
            position: relative;
            width: 100%;
            height: 100dvh;
        }

        iframe {
            width: 100%; height: 100%; border: none;
        }

        /* THE SHIELD: This invisible box sits over the top 50px 
           to stop people from clicking the toolbar buttons */
        .toolbar-shield {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 50px;
            z-index: 10;
            cursor: default;
            /* background: rgba(255,0,0,0.2); Uncomment this to see the shield */
        }
    </style>
</head>
<body oncontextmenu="return false;"> <div class="viewer-wrapper">
        <div class="toolbar-shield"></div>
        <iframe 
            src="https://mozilla.github.io/pdf.js/web/viewer.html?file=https://raw.githubusercontent.com/mozilla/pdf.js/ba2edeae/web/compressed.tracemonkey-pldi-09.pdf#toolbar=0" 
            id="pdfFrame">
        </iframe>
    </div>

    <script>
        // Disable Print (Ctrl + P) and Save (Ctrl + S)
        window.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && (e.key === 'p' || e.key === 's')) {
                e.preventDefault();
                alert("Printing and Saving are disabled for this document.");
            }
        });
    </script>
</body>
</html>
